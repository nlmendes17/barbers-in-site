<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barbers In</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Arial', sans-serif;
}

body {
  color: #fff;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('Ambiente.png') center/cover no-repeat;
  position: relative;
}

/* OVERLAY ESCURO */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

/* NAVBAR */
.navbar {
  position: absolute;
  top: 0;
  width: 100%;
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(8px);
}

/* LOGO */
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: bold;
  font-size: 18px;
}

.logo span {
  color: #d4a017;
}

/* MENU */
.menu {
  display: flex;
  gap: 25px;
}

.menu a {
  color: #fff;
  text-decoration: none;
  font-size: 14px;
}

/* BOTÃO AGENDAR */
.btn-agendar {
  background: #d4a017;
  padding: 10px 20px;
  border-radius: 6px;
  color: #000;
  font-weight: bold;
}

/* TEXTO CENTRAL */
.content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.content h1 {
  font-size: 60px;
}

.content h2 {
  font-size: 40px;
  color: #d4a017;
  margin: 10px 0;
}

.content p {
  color: #ccc;
  margin-bottom: 25px;
}

/* BOTÕES */
.buttons {
  display: flex;
  justify-content: center;
  gap: 15px;
}

.btn {
  padding: 12px 22px;
  border-radius: 6px;
  text-decoration: none;
  font-weight: bold;
}

.primary {
  background: #d4a017;
  color: #000;
}

.secondary {
  border: 1px solid #fff;
  color: #fff;
}
</style>
</head>

<body>

<section class="hero">

  <div class="overlay"></div>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo">
      ✂️ <span>Barbers In</span>
    </div>

    <div class="menu">
      <a href="#">Início</a>
      <a href="#">Serviços</a>
      <a href="#">Equipe</a>
      <a href="#">Depoimentos</a>
      <a href="#">Contato</a>
      <a href="#" class="btn-agendar">Agendar</a>
    </div>
  </div>

  <!-- CONTEÚDO -->
  <div class="content">
    <h1>Barbers In</h1>
    <h2>A arte do corte em um só lugar</h2>
    <p>Tradição, estilo e precisão em cada detalhe. Sua experiência começa aqui.</p>

    <div class="buttons">
      <a href="#" class="btn primary">Agendar horário</a>
      <a href="#" class="btn secondary">Nossos serviços</a>
    </div>
  </div>

</section>

</body>
</html>
