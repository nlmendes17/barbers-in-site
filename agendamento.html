<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agendar Horário - Barbearia HMRO</title>
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <style>
    body {
      background-color: #000;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    h1 {
      text-align: center;
      padding: 20px;
    }

    #calendar {
      max-width: 900px;
      margin: 0 auto;
      background: #111;
      padding: 20px;
      border-radius: 10px;
    }

    .fc-daygrid-event {
      background-color: white !important;
      color: black !important;
      border: none !important;
    }

    @media (max-width: 768px) {
      #calendar {
        width: 95%;
      }
    }
  </style>
</head>

<body>
  <h1>Agende seu horário</h1>
  <div id="calendar"></div>

  <script>
    const horariosReservados = [
      // Exemplo de datas bloqueadas vindas da área admin:
      { title: 'Reservado', start: '2025-08-01T10:00:00' },
      { title: 'Reservado', start: '2025-08-02T14:00:00' },
    ];

    document.addEventListener('DOMContentLoaded', function () {
      const calendarEl = document.getElementById('calendar');
      const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'timeGridWeek',
        locale: 'pt-br',
        slotMinTime: "09:00:00",
        slotMaxTime: "20:00:00",
        allDaySlot: false,
        selectable: true,
        selectMirror: true,
        nowIndicator: true,
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'timeGridDay,timeGridWeek'
        },
        select: function (info) {
          const data = info.start.toLocaleDateString('pt-BR');
          const hora = info.start.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

          // Verifica se o horário já está reservado
          const reservado = horariosReservados.some(evento => {
            const eventoHora = new Date(evento.start);
            return eventoHora.getTime() === info.start.getTime();
          });

          if (reservado) {
            alert("Esse horário já está reservado. Por favor, escolha outro.");
            return;
          }

          const mensagem = `Olá, tudo bem? Reservei o horário ${data} às ${hora} pelo site, logo estou aí.`;
          const link = `https://wa.me/5541996910927?text=${encodeURIComponent(mensagem)}`;
          window.open(link, '_blank');
        },
        businessHours: {
          daysOfWeek: [1, 2, 3, 4, 5, 6],
          startTime: '09:00',
          endTime: '20:00',
        },
        events: horariosReservados,
      });
      calendar.render();
    });
  </script>
</body>

</html>
